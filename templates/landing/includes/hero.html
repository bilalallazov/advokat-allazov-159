{% load static %}
<section id="hero" class="relative min-h-[100svh] min-h-screen flex items-end md:items-center overflow-hidden">
  <div class="absolute inset-0 hero-bg" aria-hidden="true">
    <img
      src="{% static 'img/hero-bg.png' %}"
      alt=""
      class="hero-bg-img"
      width="1920"
      height="1080"
      decoding="async"
      fetchpriority="high"
    />
  </div>
  <div class="absolute inset-0 hero-overlay" aria-hidden="true"></div>
  <div class="absolute inset-0 hero-grain" aria-hidden="true"></div>

  <div class="relative z-10 w-full mx-auto max-w-7xl px-5 md:px-8 pb-20 pt-28 md:py-36">
    <h1 class="hero-title font-display font-extrabold tracking-tight max-w-5xl hero-fade" data-hero="1">
      Статья 159 УК РФ<br />
      <span class="text-gold">Мошенничество</span>
    </h1>
    <p class="mt-6 md:mt-8 font-display text-xl md:text-3xl font-semibold text-white/95 hero-fade" data-hero="2">
      {{ site.lawyer_title }} {{ site.lawyer_name }}
    </p>
    <p class="mt-5 max-w-xl text-mute text-base md:text-lg leading-[1.75] hero-fade" data-hero="3">
      {{ page_intro }}
    </p>
    <p class="mt-7 text-sm md:text-base text-white/70 flex flex-wrap gap-x-3 gap-y-1 hero-fade" data-hero="4">
      <span>Консультация адвоката</span>
      <span class="text-gold/60">•</span>
      <span>Анализ материалов дела</span>
      <span class="text-gold/60">•</span>
      <span>Защита на всех стадиях</span>
    </p>
    <div class="mt-12 flex flex-wrap gap-4 hero-fade" data-hero="5">
      <a href="#contacts" class="btn-gold btn-ripple inline-flex items-center justify-center gap-2 rounded-[20px] bg-gold text-ink font-semibold px-8 py-4 text-base md:text-lg">
        <i data-lucide="message-circle" class="w-5 h-5"></i>
        Получить консультацию
      </a>
      <a href="https://wa.me/{{ site.whatsapp }}" target="_blank" rel="noopener" class="btn-ghost btn-ripple inline-flex items-center justify-center gap-2 rounded-[20px] border border-white/25 bg-white/5 backdrop-blur-md text-white font-semibold px-7 py-4 text-base">
        <i data-lucide="phone" class="w-5 h-5"></i>
        WhatsApp
      </a>
      <a href="tel:{{ site.phone_raw }}" class="btn-ghost btn-ripple inline-flex items-center justify-center gap-2 rounded-[20px] border border-white/25 bg-white/5 backdrop-blur-md text-white font-semibold px-7 py-4 text-base">
        {{ site.phone }}
      </a>
    </div>
  </div>

  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-10 hidden md:flex flex-col items-center gap-2 text-mute text-xs tracking-widest uppercase hero-fade" data-hero="6">
    <span>Листайте</span>
    <i data-lucide="chevron-down" class="w-5 h-5 animate-bounce text-gold"></i>
  </div>
</section>
