<section id="faq" class="relative py-20 md:py-28 bg-panel/40">
  <div class="mx-auto max-w-3xl px-5 md:px-8">
    <p class="text-gold text-sm font-semibold tracking-wide uppercase mb-3" data-aos="fade-up">Вопросы</p>
    <h2 class="font-display font-bold text-3xl md:text-5xl tracking-tight mb-10 md:mb-12" data-aos="fade-up" data-aos-delay="50">
      FAQ
    </h2>

    <div class="space-y-4" data-aos="fade-up" data-aos-delay="100">
      {% for item in faq_items %}
      <details class="faq-item glass-card rounded-glass">
        <summary class="flex items-center justify-between gap-4 cursor-pointer list-none p-6 md:p-7 font-display font-semibold text-lg">
          {{ item.question }}
          <span class="faq-chevron shrink-0 text-gold"><i data-lucide="chevron-down" class="w-5 h-5"></i></span>
        </summary>
        <div class="px-6 md:px-7 pb-6 md:pb-7 text-mute leading-relaxed">
          {{ item.answer }}
        </div>
      </details>
      {% endfor %}
    </div>
  </div>
</section>
