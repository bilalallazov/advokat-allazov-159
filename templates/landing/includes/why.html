<section id="why" class="relative py-20 md:py-28 overflow-hidden">
  <div class="absolute inset-0 why-bg" aria-hidden="true"></div>
  <div class="relative z-10 mx-auto max-w-7xl px-5 md:px-8">
    <div class="stars-row flex items-center gap-1 mb-4" data-aos="fade-up" aria-label="5 из 5 звёзд">
      <i data-lucide="star" class="w-5 h-5 text-gold"></i>
      <i data-lucide="star" class="w-5 h-5 text-gold"></i>
      <i data-lucide="star" class="w-5 h-5 text-gold"></i>
      <i data-lucide="star" class="w-5 h-5 text-gold"></i>
      <i data-lucide="star" class="w-5 h-5 text-gold"></i>
    </div>
    <h2 class="font-display font-bold text-3xl md:text-5xl tracking-tight mb-4" data-aos="fade-up" data-aos-delay="50">
      Почему выбирают нас
    </h2>
    <p class="text-white/90 text-lg md:text-xl font-display font-semibold mb-2" data-aos="fade-up" data-aos-delay="60">
      {{ site.lawyer_title }} {{ site.lawyer_name }}
    </p>
    <p class="text-sm text-gold/80 mb-12 md:mb-16" data-aos="fade-up" data-aos-delay="80">
      Нажмите на карточку, чтобы узнать больше
    </p>

    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-6">
      {% for item in advantages %}
      <button
        type="button"
        class="info-trigger glass-card rounded-glass p-7 text-left w-full group {% if item.wide %}sm:col-span-2{% endif %}"
        data-aos="fade-up"
        data-aos-delay="{{ item.delay }}"
        data-detail-target="detail-why-{{ forloop.counter0 }}"
      >
        {% if item.kind == 'counter' %}
        <p class="font-display text-4xl md:text-5xl font-bold text-gold counter" data-target="{{ item.value }}">0</p>
        <p class="mt-2 text-white font-medium">{{ item.title }}</p>
        <p class="text-sm text-mute mt-2">{{ item.description }}</p>
        {% else %}
        <div class="w-11 h-11 rounded-2xl bg-gold/10 flex items-center justify-center text-gold mb-4 group-hover:bg-gold/20 transition">
          <i data-lucide="{{ item.icon }}" class="w-5 h-5"></i>
        </div>
        <p class="text-white font-medium text-lg">{{ item.title }}</p>
        <p class="text-sm text-mute mt-2 {% if item.wide %}max-w-xl{% endif %}">{{ item.description }}</p>
        {% endif %}
        <p class="text-xs text-gold mt-4 flex items-center gap-1">
          Подробнее <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
        </p>
      </button>
      {% endfor %}
    </div>

    {% for item in advantages %}
    <template id="detail-why-{{ forloop.counter0 }}">
      <div class="detail-content">
        <div class="detail-icon">
          {% if item.icon %}
          <i data-lucide="{{ item.icon }}" class="w-6 h-6"></i>
          {% else %}
          <i data-lucide="star" class="w-6 h-6"></i>
          {% endif %}
        </div>
        <h3 class="detail-title" id="info-modal-title">
          {% if item.kind == 'counter' %}{{ item.value }} {{ item.title }}{% else %}{{ item.title }}{% endif %}
        </h3>
        <p class="detail-summary">{{ item.description }}</p>
        {% for p in item.paragraphs %}
        <p class="detail-text">{{ p }}</p>
        {% endfor %}
        {% if item.points %}
        <p class="detail-subtitle">Что это даёт</p>
        <ul class="detail-list">
          {% for row in item.points %}<li>{{ row }}</li>{% endfor %}
        </ul>
        {% endif %}
        <a href="#contacts" class="detail-cta" data-modal-close>
          Получить консультацию
          <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </a>
      </div>
    </template>
    {% endfor %}
  </div>
</section>
